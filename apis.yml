apis:
  - aid: replicate:replicate
    name: Replicate
    description: >-
      Replicate lets you run machine learning models in the cloud with a simple
      REST API. Access thousands of open-source models for image generation,
      language modeling, audio synthesis, video generation, upscaling, and more.
      Create predictions, manage deployments, fine-tune models, and run training
      jobs via a clean API with webhooks and streaming support.
    humanURL: https://replicate.com/
