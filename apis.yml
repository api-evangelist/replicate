aid: replicate
name: Replicate
description: >-
  Replicate lets you run machine learning models in the cloud with a simple API.
  Thousands of open-source models are available, and you can run your own custom
  models at scale. Run image generation, language models, audio synthesis, video
  generation, and more with a few lines of code. Replicate makes AI accessible
  to every software engineer.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Artificial Intelligence
  - Machine Learning
  - Image Generation
  - Language Models
  - Model Deployment
