aid: replicate
name: Replicate
description: Replicate lets you run machine learning models in the cloud with a simple
  API. Thousands of open-source models are available, and you can run your own custom
  models at scale. Run image generation, language models, audio synthesis, video generation,
  and more with a few lines of code. Replicate makes AI accessible to every software
  engineer.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Artificial Intelligence
- Machine Learning
- Image Generation
- Language Models
- Model Deployment
url: https://raw.githubusercontent.com/api-evangelist/replicate/refs/heads/main/apis.yml
created: '2024-11-13'
modified: '2026-05-29'
specificationVersion: '0.19'
apis:
- aid: replicate:replicate
  name: Replicate
  description: Replicate lets you run machine learning models in the cloud with a
    simple REST API. Access thousands of open-source models for image generation,
    language modeling, audio synthesis, video generation, upscaling, and more. Create
    predictions, manage deployments, fine-tune models, and run training jobs via a
    clean API with webhooks and streaming support.
  humanURL: https://replicate.com/
  tags:
  - Accounts
  - Artificial Intelligence
  - Collections
  - Deployments
  - Hardware
  - Machine Learning
  - Models
  - Predictions
  - Training
  - Webhooks
