naftiko: 1.0.0-alpha2
info:
  label: Replicate — Slug
  description: 'Replicate — Slug. 1 operations. Lead operation: Get a Collection of Models. Self-contained Naftiko capability
    covering one Replicate business surface.'
  tags:
  - Replicate
  - Slug
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REPLICATE_API_KEY: REPLICATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: replicate-slug
    baseUri: https://api.replicate.com/v1
    description: Replicate — Slug business capability. Self-contained, no shared references.
    resources:
    - name: collections-collection_slug
      path: /collections/{collection_slug}
      operations:
      - name: collectionsget
        method: GET
        description: Get a Collection of Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: collection_slug
          in: path
          type: string
          description: The slug of the collection, like `super-resolution` or `image-restoration`. See [replicate.com/collections](https://replicate.com/collections).
          required: true
    authentication:
      type: bearer
      token: '{{env.REPLICATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: replicate-slug-rest
    port: 8080
    description: REST adapter for Replicate — Slug. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/collections/{collection-slug}
      name: collections-collection-slug
      description: REST surface for collections-collection_slug.
      operations:
      - method: GET
        name: collectionsget
        description: Get a Collection of Models
        call: replicate-slug.collectionsget
        with:
          collection_slug: rest.collection_slug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: replicate-slug-mcp
    port: 9090
    transport: http
    description: MCP adapter for Replicate — Slug. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-collection-models
      description: Get a Collection of Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replicate-slug.collectionsget
      with:
        collection_slug: tools.collection_slug
      outputParameters:
      - type: object
        mapping: $.
