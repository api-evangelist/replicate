naftiko: 1.0.0-alpha2
info:
  label: Replicate — Trainings
  description: 'Replicate — Trainings. 1 operations. Lead operation: List Trainings. Self-contained Naftiko capability covering
    one Replicate business surface.'
  tags:
  - Replicate
  - Trainings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REPLICATE_API_KEY: REPLICATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: replicate-trainings
    baseUri: https://api.replicate.com/v1
    description: Replicate — Trainings business capability. Self-contained, no shared references.
    resources:
    - name: trainings
      path: /trainings
      operations:
      - name: trainingslist
        method: GET
        description: List Trainings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.REPLICATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: replicate-trainings-rest
    port: 8080
    description: REST adapter for Replicate — Trainings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/trainings
      name: trainings
      description: REST surface for trainings.
      operations:
      - method: GET
        name: trainingslist
        description: List Trainings
        call: replicate-trainings.trainingslist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: replicate-trainings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Replicate — Trainings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-trainings
      description: List Trainings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replicate-trainings.trainingslist
      outputParameters:
      - type: object
        mapping: $.
