          type: string
          description: The name of the user or organization that owns the model.
          required: true
        - name: model_name
          in: path
          type: string
          description: The name of the model.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: predictions
