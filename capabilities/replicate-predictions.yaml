      operations:
      - name: predictionslist
        method: GET
        description: List Predictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: predictionscreate
        method: POST
        description: Create a Prediction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
