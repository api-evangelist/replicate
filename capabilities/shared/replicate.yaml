naftiko: "1.0.0-alpha1"

info:
  label: "Replicate API"
  description: >-
    Replicate lets you run machine learning models in the cloud with a simple
    REST API. Access thousands of open-source models, manage deployments, run
    predictions, fine-tune models, and execute training jobs.
  tags:
    - Artificial Intelligence
    - Machine Learning
    - Model Inference
    - Model Deployment
    - Training
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      REPLICATE_API_TOKEN: REPLICATE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: replicate
      baseUri: https://api.replicate.com/v1
      description: "Replicate REST API for running ML models and managing resources."
      authentication:
        type: bearer
        token: "{{REPLICATE_API_TOKEN}}"
      resources:
        - name: account
          path: /account
          description: "Account information for the authenticated user or organization."
          operations:
            - name: get-account
              method: GET
              description: "Get the authenticated account information."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: collections
          path: /collections
          description: "Curated collections of models."
          operations:
            - name: list-collections
              method: GET
              description: "List all collections of models."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-collection
              method: GET
              description: "Get a specific collection of models by slug."
              inputParameters:
                - name: collection_slug
                  in: path
                  type: string
                  required: true
                  description: "The slug of the collection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deployments
          path: /deployments
          description: "Manage model deployments for production use."
          operations:
            - name: list-deployments
              method: GET
              description: "List all deployments for the authenticated account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deployment
              method: POST
              description: "Create a new model deployment."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  model: "{{tools.model}}"
                  version: "{{tools.version}}"
                  hardware: "{{tools.hardware}}"
                  min_instances: "{{tools.min_instances}}"
                  max_instances: "{{tools.max_instances}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-deployment
              method: GET
              description: "Get a specific deployment by owner and name."
              inputParameters:
                - name: deployment_owner
                  in: path
                  type: string
                  required: true
                  description: "The deployment owner."
                - name: deployment_name
                  in: path
                  type: string
                  required: true
                  description: "The deployment name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-deployment
              method: PATCH
              description: "Update a deployment configuration."
              inputParameters:
                - name: deployment_owner
                  in: path
                  type: string
                  required: true
                  description: "The deployment owner."
                - name: deployment_name
                  in: path
                  type: string
                  required: true
                  description: "The deployment name."
              body:
                type: json
                data:
                  hardware: "{{tools.hardware}}"
                  min_instances: "{{tools.min_instances}}"
                  max_instances: "{{tools.max_instances}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-deployment
              method: DELETE
              description: "Delete a deployment."
              inputParameters:
                - name: deployment_owner
                  in: path
                  type: string
                  required: true
                  description: "The deployment owner."
                - name: deployment_name
                  in: path
                  type: string
                  required: true
                  description: "The deployment name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deployment-prediction
              method: POST
              description: "Create a prediction using a deployment."
              inputParameters:
                - name: deployment_owner
                  in: path
                  type: string
                  required: true
                  description: "The deployment owner."
                - name: deployment_name
                  in: path
                  type: string
                  required: true
                  description: "The deployment name."
              body:
                type: json
                data:
                  input: "{{tools.input}}"
                  webhook: "{{tools.webhook}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: hardware
          path: /hardware
          description: "Available hardware options for running models."
          operations:
            - name: list-hardware
              method: GET
              description: "List all available hardware options."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: models
          path: /models
          description: "ML models hosted on Replicate."
          operations:
            - name: list-models
              method: GET
              description: "List all public models."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-model
              method: POST
              description: "Create a new model."
              body:
                type: json
                data:
                  owner: "{{tools.owner}}"
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  visibility: "{{tools.visibility}}"
                  hardware: "{{tools.hardware}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-models
              method: GET
              description: "Search public models."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query string."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-model
              method: GET
              description: "Get a specific model."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-model
              method: DELETE
              description: "Delete a model."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-model-prediction
              method: POST
              description: "Create a prediction using an official model."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
              body:
                type: json
                data:
                  input: "{{tools.input}}"
                  webhook: "{{tools.webhook}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-model-versions
              method: GET
              description: "List all versions of a model."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-model-version
              method: GET
              description: "Get a specific model version."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
                - name: version_id
                  in: path
                  type: string
                  required: true
                  description: "The version ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-model-version
              method: DELETE
              description: "Delete a specific model version."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
                - name: version_id
                  in: path
                  type: string
                  required: true
                  description: "The version ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: predictions
          path: /predictions
          description: "Inference runs against ML models."
          operations:
            - name: list-predictions
              method: GET
              description: "List all predictions for the authenticated account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-prediction
              method: POST
              description: "Create a new prediction."
              body:
                type: json
                data:
                  version: "{{tools.version}}"
                  input: "{{tools.input}}"
                  webhook: "{{tools.webhook}}"
                  webhook_events_filter: "{{tools.webhook_events_filter}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-prediction
              method: GET
              description: "Get a specific prediction."
              inputParameters:
                - name: prediction_id
                  in: path
                  type: string
                  required: true
                  description: "The prediction ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-prediction
              method: POST
              description: "Cancel a running prediction."
              inputParameters:
                - name: prediction_id
                  in: path
                  type: string
                  required: true
                  description: "The prediction ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: trainings
          path: /trainings
          description: "Fine-tuning jobs for ML models."
          operations:
            - name: list-trainings
              method: GET
              description: "List all trainings for the authenticated account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-training
              method: POST
              description: "Create a new training job on a model version."
              inputParameters:
                - name: model_owner
                  in: path
                  type: string
                  required: true
                  description: "The model owner."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "The model name."
                - name: version_id
                  in: path
                  type: string
                  required: true
                  description: "The version ID to train."
              body:
                type: json
                data:
                  destination: "{{tools.destination}}"
                  input: "{{tools.input}}"
                  webhook: "{{tools.webhook}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-training
              method: GET
              description: "Get a specific training job."
              inputParameters:
                - name: training_id
                  in: path
                  type: string
                  required: true
                  description: "The training ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-training
              method: POST
              description: "Cancel a running training job."
              inputParameters:
                - name: training_id
                  in: path
                  type: string
                  required: true
                  description: "The training ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: webhooks
          path: /webhooks/default/secret
          description: "Webhook signing secret management."
          operations:
            - name: get-webhook-secret
              method: GET
              description: "Get the signing secret for the default webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: replicate-rest
      resources:
        - path: /v1/account
          name: account
          description: "Account information."
          operations:
            - method: GET
              name: get-account
              description: "Get authenticated account information."
              call: "replicate.get-account"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/models
          name: models
          description: "Browse and manage models."
          operations:
            - method: GET
              name: list-models
              description: "List public models."
              call: "replicate.list-models"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/predictions
          name: predictions
          description: "Manage predictions."
          operations:
            - method: GET
              name: list-predictions
              description: "List predictions."
              call: "replicate.list-predictions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: replicate-mcp
      transport: http
      tools:
        - name: get-account
          description: "Get authenticated Replicate account information."
          hints:
            readOnly: true
            openWorld: false
          call: "replicate.get-account"
          outputParameters:
            - type: object
              mapping: "$."
