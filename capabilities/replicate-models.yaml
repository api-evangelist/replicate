naftiko: 1.0.0-alpha2
info:
  label: Replicate — Models
  description: 'Replicate — Models. 2 operations. Lead operation: List Public Models. Self-contained Naftiko capability covering
    one Replicate business surface.'
  tags:
  - Replicate
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REPLICATE_API_KEY: REPLICATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: replicate-models
    baseUri: https://api.replicate.com/v1
    description: Replicate — Models business capability. Self-contained, no shared references.
    resources:
    - name: models
      path: /models
      operations:
      - name: modelslist
        method: GET
        description: List Public Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: modelscreate
        method: POST
        description: Create a Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.REPLICATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: replicate-models-rest
    port: 8080
    description: REST adapter for Replicate — Models. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for models.
      operations:
      - method: GET
        name: modelslist
        description: List Public Models
        call: replicate-models.modelslist
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: modelscreate
        description: Create a Model
        call: replicate-models.modelscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: replicate-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Replicate — Models. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-public-models
      description: List Public Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replicate-models.modelslist
      outputParameters:
      - type: object
        mapping: $.
    - name: create-model
      description: Create a Model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: replicate-models.modelscreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
